<div class="export-shell">
  <section class="preview-area">
    <app-export-preview [src]="image()" [filters]="filters()" [cropRect]="cropRect()" />
  </section>

  <app-export-controls
    class="sidebar-area"
    [formats]="formats()"
    [selectedFormat]="format()"
    [quality]="quality()"
    [scale]="scale()"
    [estimatedSize]="estimatedSize()"
    [isProcessing]="isProcessing()"
    [buttonText]="buttonText()"
    [batchWarning]="batchWarning()"
    (formatChange)="formatChange.emit($event)"
    (qualityChange)="qualityChange.emit($event)"
    (scaleChange)="scaleChange.emit($event)"
    (download)="download.emit()"
    (back)="back.emit()"
  />
</div>
