<aside class="export-sidebar">
  <div class="sidebar-content">
    <header class="sidebar-header">
      <h2>Export Specifications</h2>
    </header>

    <div class="format-selection">
      <p class="group-label">File Format</p>
      <div class="format-list">
        @for (format of formats; track format.value) {
          <app-lib-pill
            [active]="selectedFormat() === format.value"
            (selected)="formatChange.emit(format.value)"
          >
            {{ format.label }}
          </app-lib-pill>
        }
      </div>
    </div>
  </div>

  <div class="sidebar-footer">
    <app-lib-button variant="secondary" (clicked)="back.emit()" [disabled]="isProcessing()">
      Return to Edit
    </app-lib-button>

    <app-lib-button [loading]="isProcessing()" (clicked)="download.emit()">
      Download Render
    </app-lib-button>
  </div>
</aside>
