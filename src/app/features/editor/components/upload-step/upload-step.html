<section
  class="upload-viewport"
  [class.active]="isDragging()"
  (drop)="onDrop($event)"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
>
  <div class="hero-header">
    <h1 class="logo">opifx</h1>
    <p class="subtitle">industrial-grade atmospheric image processor</p>
  </div>

  <div class="upload-frame">
    <div class="content">
      <div class="drag-icon">[ + ]</div>
      <p class="primary-text">Drag & drop imagery</p>
      <p class="muted">PNG, JPG, WEBP formats supported</p>

      <label class="fx-btn-primary mt-4">
        <span>Initialize Workspace</span>
        <input type="file" (change)="onFileSelected($event)" accept="image/*" hidden />
      </label>
    </div>

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>
</section>
