<section
  class="upload-viewport"
  [class.active]="isDragging()"
  (drop)="onDrop($event)"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
>
  <div class="upload-frame">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="content">
      <h1 class="text-mono">FX / INGEST_SRC</h1>
      <p class="text-mono muted">Drop image or click to browse</p>

      <label class="fx-btn-primary">
        <span class="text-mono">IMPORT_FILE</span>
        <input type="file" (change)="onFileSelected($event)" accept="image/*" hidden />
      </label>
    </div>
  </div>
</section>
