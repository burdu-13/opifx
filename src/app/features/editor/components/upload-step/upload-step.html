<section
  class="upload-viewport"
  [class.active]="isDragging()"
  (drop)="onDrop($event)"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
>
  <div class="upload-frame">
    <div class="content">
      <h1>Upload image</h1>
      <p class="muted">Drag and drop your image here, or click to browse</p>

      <label class="fx-btn-primary">
        <span>Select file</span>
        <input type="file" (change)="onFileSelected($event)" accept="image/*" hidden />
      </label>
    </div>
  </div>
</section>
