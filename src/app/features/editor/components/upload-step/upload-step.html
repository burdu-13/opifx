<div
  class="home-layout"
  [class.is-dragging]="isDragging()"
  (drop)="onDrop($event)"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
>
  <main class="home-hero">
    <div class="hero-content">
      <span class="eyebrow">Creative Studio</span>
      <h1 class="headline">Professional imaging &amp; color grading.</h1>
      <p class="subtitle">
        A calm space to refine, grade, and output your images with absolute precision.
      </p>

      <div class="features-list">
        <div class="feature-item">
          <span>Real-time processing</span>
        </div>
        <div class="feature-item">
          <span>Non-destructive workflows</span>
        </div>
        <div class="feature-item">
          <span>Intelligent presets</span>
        </div>
      </div>
    </div>

    <div class="hero-visual">
      <div class="upload-frame">
        <div class="content">
          <div class="drag-icon"></div>
          <p class="primary-text">Drag & drop your image</p>
          <p class="muted">or click to browse your files.</p>

          <app-lib-button class="mt-4" (clicked)="fileInput.click()"> Upload Image </app-lib-button>
          <input
            #fileInput
            type="file"
            multiple
            (change)="onFileSelected($event)"
            accept="image/*"
            hidden
          />
        </div>
      </div>
    </div>
  </main>

  <footer class="home-footer">
    <div class="footer-content">
      <span class="muted">© 2026 OpiFX</span>
    </div>
  </footer>
</div>
