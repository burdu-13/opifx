<div
  class="crop-overlay"
  #overlayRef
  (pointermove)="onPointerMove($event)"
  (pointerup)="onPointerUp()"
  (pointercancel)="onPointerUp()"
>
  <!-- Dimmed mask: covers the entire overlay, clip-path cuts out the crop area -->
  <div class="crop-mask" [style.clip-path]="maskClipPath()"></div>

  <!-- Crop box: positioned with percentage values from normalized coords -->
  <div
    class="crop-box"
    [style.left]="boxStyle().left"
    [style.top]="boxStyle().top"
    [style.width]="boxStyle().width"
    [style.height]="boxStyle().height"
    (pointerdown)="onBoxPointerDown($event)"
  >
    <!-- Rule of thirds grid -->
    <div class="thirds-grid">
      <div class="thirds-line horizontal" style="top: 33.33%"></div>
      <div class="thirds-line horizontal" style="top: 66.66%"></div>
      <div class="thirds-line vertical" style="left: 33.33%"></div>
      <div class="thirds-line vertical" style="left: 66.66%"></div>
    </div>

    <!-- 8 resize handles -->
    @for (handle of handles; track handle.id) {
      <div
        [class]="getHandleClass(handle.id)"
        [style.cursor]="handle.cursor"
        (pointerdown)="onHandlePointerDown($event, handle.id)"
      ></div>
    }
  </div>
</div>
