<div
  class="canvas-wrapper"
  (mousedown)="onMouseDown($event)"
  (mousemove)="onMouseMove($event)"
  (mouseup)="onMouseUp()"
  (mouseleave)="onMouseUp()"
  (wheel)="onWheel($event)"
>
  <canvas
    #mainCanvas
    [class.is-panning]="isDragging()"
    [style.transform]="transformStyle()"
  ></canvas>
</div>
