<aside class="sidebar">
  <div class="sidebar-content">
    <header class="sidebar-header">
      <h2>Adjustments</h2>
    </header>

    <div class="parameter-groups">
      <div class="group">
        <p class="group-label">Standard</p>
        @for (ctrl of standardControls(); track ctrl.key) {
          <app-lib-slider
            [label]="ctrl.label"
            [value]="ctrl.currentValue"
            [min]="ctrl.min"
            [max]="ctrl.max"
            [stepSize]="ctrl.step"
            [unit]="ctrl.unit"
            (valueChange)="update(ctrl.key, $event)"
          />
        }
      </div>

      <div class="group">
        <p class="group-label">Aesthetics</p>
        @for (ctrl of aestheticControls(); track ctrl.key) {
          <app-lib-slider
            [label]="ctrl.label"
            [value]="ctrl.currentValue"
            [min]="ctrl.min"
            [max]="ctrl.max"
            [stepSize]="ctrl.step"
            [unit]="ctrl.unit"
            (valueChange)="update(ctrl.key, $event)"
          />
        }
      </div>
    </div>
  </div>

  <div class="sidebar-footer">
    <button class="btn-proceed" (click)="proceed.emit()">Export Sequence</button>
  </div>
</aside>
