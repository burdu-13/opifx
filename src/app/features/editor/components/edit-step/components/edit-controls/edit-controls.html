<aside class="sidebar">
  <div class="sidebar-content">
    <header class="sidebar-header">
      <h2>Adjustments</h2>
    </header>

    <div class="parameter-groups">
      <div class="group">
        <p class="group-label">Standard</p>
        @for (ctrl of standardGroup; track ctrl.key) {
          <app-lib-slider
            [label]="ctrl.label"
            [value]="$any(filters())[ctrl.key]"
            [min]="ctrl.min"
            [max]="ctrl.max"
            [stepSize]="ctrl.step"
            [unit]="ctrl.unit"
            (valueChange)="update(ctrl.key, $event)"
          />
        }
      </div>

      <div class="group">
        <p class="group-label">Aesthetics</p>
        @for (ctrl of aestheticGroup; track ctrl.key) {
          <app-lib-slider
            [label]="ctrl.label"
            [value]="$any(filters())[ctrl.key]"
            [min]="ctrl.min"
            [max]="ctrl.max"
            [stepSize]="ctrl.step"
            [unit]="ctrl.unit"
            (valueChange)="update(ctrl.key, $event)"
          />
        }
      </div>
    </div>
  </div>

  <button class="btn-proceed" (click)="proceed.emit()">Export result</button>
</aside>
