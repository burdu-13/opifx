<aside class="sidebar">
  <div class="sidebar-content">
    <header class="sidebar-header">
      <h2 class="text-mono">FX / PARAMETERS</h2>
    </header>

    <div class="parameter-groups">
      <div class="group">
        <p class="group-label text-mono">Standard</p>
        @for (ctrl of standardGroup; track ctrl.key) {
          <app-lib-slider
            [label]="ctrl.label"
            [value]="$any(filters())[ctrl.key]"
            [min]="ctrl.min"
            [max]="ctrl.max"
            [stepSize]="ctrl.step"
            [unit]="ctrl.unit"
            (valueChange)="update(ctrl.key, $event)"
          />
        }
      </div>

      <div class="group">
        <p class="group-label text-mono">Aesthetic</p>
        @for (ctrl of aestheticGroup; track ctrl.key) {
          <app-lib-slider
            [label]="ctrl.label"
            [value]="$any(filters())[ctrl.key]"
            [min]="ctrl.min"
            [max]="ctrl.max"
            [stepSize]="ctrl.step"
            [unit]="ctrl.unit"
            (valueChange)="update(ctrl.key, $event)"
          />
        }
      </div>
    </div>
  </div>

  <button class="btn-proceed text-mono" (click)="proceed.emit()">EXPORT_SEQUENCE</button>
</aside>
