<div class="crop-section">
  <div class="crop-header">
    <p class="group-label">Crop</p>
    <button class="btn-toggle" [class.active]="isCropActive()" (click)="onToggle()">
      {{ toggleLabel() }}
    </button>
  </div>

  @if (isCropActive()) {
    <div class="crop-options">
      <div class="aspect-ratios">
        @for (opt of aspectRatioOptions(); track opt.label) {
          <button
            class="ratio-pill"
            [class.active]="aspectRatio() === opt.value"
            (click)="onAspectRatio(opt.value)"
          >
            {{ opt.label }}
          </button>
        }
      </div>

      @if (cropRect()) {
        <div class="crop-dimensions">
          <span class="dim">{{ dimensionLabel() }}</span>
        </div>
      }

      <div class="custom-resolution">
        <p class="sub-label">Custom size (px)</p>
        <div class="resolution-inputs">
          <input
            type="number"
            class="res-input"
            placeholder="W"
            [value]="customW()"
            (input)="customW.set($any($event.target).value)"
            [max]="sourceWidth()"
            min="1"
          />
          <span class="res-sep">×</span>
          <input
            type="number"
            class="res-input"
            placeholder="H"
            [value]="customH()"
            (input)="customH.set($any($event.target).value)"
            [max]="sourceHeight()"
            min="1"
          />
          <button class="btn-apply-res" (click)="onCustomResolution()">Set</button>
        </div>
      </div>

      <div class="crop-actions">
        <button class="btn-crop-action apply" (click)="onApply()">Apply Crop</button>
        <button class="btn-crop-action reset" (click)="onReset()">Reset</button>
      </div>
    </div>
  }
</div>
