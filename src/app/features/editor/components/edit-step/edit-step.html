<div class="edit-layout">
  <section class="viewport">
    <div class="canvas-holder">
      <canvas #mainCanvas></canvas>
    </div>
  </section>

  <aside class="sidebar">
    <div class="sidebar-content">
      <header class="sidebar-header">
        <h2 class="text-mono">FX / PARAMETERS</h2>
      </header>

      <div class="parameter-groups">
        <div class="group">
          <p class="group-label text-mono">Standard</p>
          <app-lib-slider
            label="Brightness"
            [value]="filters().brightness"
            (valueChange)="update('brightness', $event)"
          />
          <app-lib-slider
            label="Contrast"
            [value]="filters().contrast"
            (valueChange)="update('contrast', $event)"
          />
        </div>

        <div class="group">
          <p class="group-label text-mono">Aesthetic</p>
          <app-lib-slider
            label="Grain"
            [value]="filters().grain"
            [max]="100"
            (valueChange)="update('grain', $event)"
          />
          <app-lib-slider
            label="Chroma Shift"
            [value]="filters().chromaticAberration"
            [max]="20"
            unit="px"
            (valueChange)="update('chromaticAberration', $event)"
          />
        </div>
      </div>
    </div>

    <button class="btn-proceed text-mono" (click)="proceed.emit()">EXPORT_SEQUENCE</button>
  </aside>
</div>
