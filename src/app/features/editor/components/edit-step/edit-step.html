<div class="edit-shell">
  <section class="viewport-area">
    <div class="cloud-glow"></div>

    <app-preview-image
      [src]="image()"
      [filters]="filters()"
      [zoom]="zoom()"
      [position]="position()"
      (pan)="handlePan($event)"
    />

    <div class="viewport-meta text-mono">
      <span>Z_LVL: {{ (zoom() * 100).toFixed(0) }}%</span>
      <div class="controls-mini">
        <button (click)="updateZoom(0.1)">+</button>
        <button (click)="updateZoom(-0.1)">-</button>
        <button (click)="resetView()">RST</button>
      </div>
    </div>
  </section>

  <app-edit-controls
    class="sidebar-area"
    [filters]="filters()"
    (change)="filterChange.emit($event)"
    (presetSelected)="presetSelected.emit($event)"
    (proceed)="proceed.emit()"
  />
</div>
