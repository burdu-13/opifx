<div class="edit-shell">
  <header class="editor-toolbar">
    <div class="toolbar-left">
      <div class="zoom-controls">
        <button class="icon-btn" (click)="updateZoom(-0.1)" title="Zoom Out">−</button>
        <span class="zoom-level">{{ zoomLabel() }}</span>
        <button class="icon-btn" (click)="updateZoom(0.1)" title="Zoom In">+</button>
        <button class="icon-btn" (click)="resetView()" title="Fit to Screen">
        <img src="images/svgs/fit-screen-icon.svg" width="14" height="14" alt="Fit to Screen" />
        </button>
      </div>
    </div>
    
    <div class="toolbar-right">
      <button class="btn-text" 
              (mousedown)="showBefore.set(true)"
              (mouseup)="showBefore.set(false)"
              (mouseleave)="showBefore.set(false)"
              (touchstart)="showBefore.set(true)"
              (touchend)="showBefore.set(false)"
              title="Hold to see original">
        Hold to Compare
      </button>
      <div class="toolbar-divider"></div>
      <app-lib-button (clicked)="proceedToExport()">Export Image</app-lib-button>
    </div>
  </header>

  <div class="editor-workspace">
    <section class="viewport-area" [class.full-width]="isPresetGalleryOpen()">
      <div class="cloud-glow"></div>

      <app-preset-bar
        [presets]="presets"
        [activePresetId]="activePresetId()"
        [presetSpecs]="activeSpecs()"
        [presetDetails]="activePresetDetails()"
        (presetSelected)="handlePresetSelection($event)"
        (expandedChange)="isPresetGalleryOpen.set($event)"
      />

      <app-preview-image
        [src]="image()"
        [filters]="activeFilters()"
        [zoom]="zoom()"
        [position]="position()"
        [appliedCropRect]="appliedCropRect()"
        (pan)="handlePan($event)"
        (zoomDelta)="updateZoom($event)"
        (canvasDimensions)="handleCanvasDimensions($event)"
      >
        @if (isCropActive() && cropRect()) {
          <app-crop-overlay
            [cropRect]="cropRect()!"
            [aspectRatio]="aspectRatio()"
            [imageAspect]="imageAspect()"
            (cropChange)="handleCropChange($event)"
          />
        }
      </app-preview-image>
    </section>

    @if (!isPresetGalleryOpen()) {
      <app-edit-controls
        class="sidebar-area"
        [standardControls]="standardControls()"
        [aestheticControls]="aestheticControls()"
        [isCropActive]="isCropActive()"
        [aspectRatio]="aspectRatio()"
        [cropRect]="cropRect()"
        [aspectRatioOptions]="aspectRatioOptions"
        [sourceWidth]="sourceWidth()"
        [sourceHeight]="sourceHeight()"
        (change)="handleManualChange($event)"
        (reset)="handleReset()"
        (toggleCrop)="handleToggleCrop()"
        (aspectRatioChange)="handleAspectRatioChange($event)"
        (cropApply)="handleCropApply()"
        (cropReset)="handleCropReset()"
        (customResolution)="handleCustomResolution($event)"
      />
    }
  </div>
</div>
