<div class="edit-shell">
  <header class="editor-toolbar">
    <div class="toolbar-left">
      <div class="zoom-controls">
        <button class="icon-btn" (click)="zoomUpdate.emit(-0.1)" title="Zoom Out">−</button>
        <span class="zoom-level">{{ zoomLabel() }}</span>
        <button class="icon-btn" (click)="zoomUpdate.emit(0.1)" title="Zoom In">+</button>
        <button class="icon-btn" (click)="resetView.emit()" title="Fit to Screen">
          <div class="fit-screen-icon"></div>
        </button>
      </div>
    </div>

    <div class="toolbar-right">
      @if (isBatchMode()) {
        <app-lib-button variant="secondary" (clicked)="backToBatch.emit()"
          >Back to Grid</app-lib-button
        >
        <button class="btn-text" (click)="applyToAll.emit()">Apply to All</button>
        <div class="toolbar-divider"></div>
      }
      <button
        class="btn-text"
        (mousedown)="showBeforeChange.emit(true)"
        (mouseup)="showBeforeChange.emit(false)"
        (mouseleave)="showBeforeChange.emit(false)"
        (touchstart)="showBeforeChange.emit(true)"
        (touchend)="showBeforeChange.emit(false)"
        title="Hold to see original"
      >
        Hold to Compare
      </button>
      <div class="toolbar-divider"></div>
      <app-lib-button (clicked)="proceedToExport.emit()"> Export </app-lib-button>
    </div>
  </header>

  <div class="editor-workspace">
    <section class="viewport-area" [class.full-width]="isPresetGalleryOpen()">
      <div class="cloud-glow"></div>

      <app-preset-bar
        class="preset-bar-layer"
        [presets]="presets()"
        [activePresetId]="activePresetId()"
        [presetSpecs]="activeSpecs()"
        [presetDetails]="activePresetDetails()"
        (presetSelected)="presetSelection.emit($event)"
        (expandedChange)="presetGalleryOpenChange.emit($event)"
      />

      <app-preview-image
        class="preview-image-layer"
        [src]="image()"
        [filters]="activeFilters()"
        [zoom]="zoom()"
        [position]="position()"
        [appliedCropRect]="appliedCropRect()"
        (pan)="pan.emit($event)"
        (zoomDelta)="zoomUpdate.emit($event)"
        (canvasDimensions)="canvasDimensions.emit($event)"
      >
        @if (isCropActive() && cropRect()) {
          <app-crop-overlay
            [cropRect]="cropRect()!"
            [aspectRatio]="aspectRatio()"
            [imageAspect]="imageAspect()"
            (cropChange)="cropChange.emit($event)"
          />
        }
      </app-preview-image>
    </section>

    @if (!isPresetGalleryOpen()) {
      <app-edit-controls
        class="sidebar-area"
        [standardControls]="standardControls()"
        [aestheticControls]="aestheticControls()"
        [isCropActive]="isCropActive()"
        [aspectRatio]="aspectRatio()"
        [cropRect]="cropRect()"
        [aspectRatioOptions]="aspectRatioOptions()"
        [sourceWidth]="sourceWidth()"
        [sourceHeight]="sourceHeight()"
        (change)="manualChange.emit($event)"
        (reset)="reset.emit()"
        (toggleCrop)="toggleCrop.emit()"
        (aspectRatioChange)="aspectRatioChange.emit($event)"
        (cropApply)="cropApply.emit()"
        (cropReset)="cropReset.emit()"
        (customResolution)="customResolution.emit($event)"
      />
    }
  </div>
</div>
