<div class="fx-shell">
  <main class="workspace-content">
    @if (srv.imagesList().length === 0) {
      <app-upload-step />
    } @else {
      @if (srv.isBatchMode() && !srv.activeId()) {
        <app-library-grid
          [images]="srv.imagesList()"
          (select)="srv.setActiveImage($event)"
          (process)="proceedToExport()"
        />
      } @else {
        <app-edit-step
          [image]="srv.sourceImage()"
          [filters]="srv.filters()"
          [isBatchMode]="srv.isBatchMode()"
          [presets]="presets"
          [activePresetId]="srv.activePresetId()"
          [isPresetGalleryOpen]="isPresetGalleryOpen()"
          [zoom]="zoom()"
          [position]="position()"
          [zoomLabel]="zoomLabel()"
          [activeFilters]="activeFilters()"
          [sourceWidth]="sourceWidth()"
          [sourceHeight]="sourceHeight()"
          [activePresetDetails]="activePresetDetails()"
          [activeSpecs]="activeSpecs()"
          [standardControls]="standardControls()"
          [aestheticControls]="aestheticControls()"
          [isCropActive]="cropSrv.isCropActive()"
          [cropRect]="cropSrv.cropRect()"
          [aspectRatio]="cropSrv.aspectRatio()"
          [aspectRatioOptions]="aspectRatioOptions"
          [imageAspect]="imageAspect()"
          [appliedCropRect]="appliedCropRect()"
          (canvasDimensions)="handleCanvasDimensions($event)"
          (presetSelection)="handlePresetSelection($event)"
          (presetGalleryOpenChange)="isPresetGalleryOpen.set($event)"
          (reset)="handleReset()"
          (manualChange)="handleManualChange($event)"
          (zoomUpdate)="updateZoom($event)"
          (resetView)="resetView()"
          (pan)="handlePan($event)"
          (proceedToExport)="proceedToExport()"
          (backToBatch)="backToBatch()"
          (applyToAll)="applyToAll()"
          (showBeforeChange)="showBefore.set($event)"
          (toggleCrop)="handleToggleCrop()"
          (cropChange)="handleCropChange($event)"
          (aspectRatioChange)="handleAspectRatioChange($event)"
          (cropApply)="handleCropApply()"
          (cropReset)="handleCropReset()"
          (customResolution)="handleCustomResolution($event)"
        />
      }
    }
  </main>
</div>
