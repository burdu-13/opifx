@if (editorSrv.imagesList().length === 0) {
  <section class="upload-viewport">
    <div class="hero-content">
      <h1 class="hero-title">Batch Processing</h1>
      <p class="hero-subtitle">Process multiple atmospheres simultaneously.</p>
    </div>

    <div
      class="upload-frame upload-area"
      [class.drag-over]="isDragging()"
      (drop)="onDrop($event)"
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave()"
    >
      <div class="upload-content">
        <h2 class="prompt-text">Drop Images Here</h2>
        <span class="sub-text">PNG, JPG, WEBP compatible</span>
        
        <div class="divider">
          <span>OR</span>
        </div>

        <app-lib-button class="cta-btn" variant="primary" (clicked)="fileInput.click()">
          Select Files
        </app-lib-button>
        <input
          #fileInput
          type="file"
          multiple
          accept="image/*"
          (change)="onFileSelected($event)"
          tabindex="-1"
        />
      </div>
    </div>
  </section>
} @else {
  <section class="batch-workspace">
    <header class="batch-toolbar">
      <div class="batch-actions">
        <app-lib-button variant="secondary" (clicked)="editorSrv.resetAll()">Clear Batch</app-lib-button>
        <app-lib-button variant="primary" (clicked)="goToExport()">Export All</app-lib-button>
      </div>
    </header>
    <div class="batch-grid">
      @for (image of editorSrv.imagesList(); track image.id) {
        <div class="grid-card" (click)="openEditor(image.id)">
           <img [src]="image.url" class="card-preview" />
           <p class="card-name">{{ image.name }}</p>
        </div>
      }
    </div>
  </section>
}
