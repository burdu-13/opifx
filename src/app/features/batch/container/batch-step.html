<section class="batch-workspace">
  <header class="batch-toolbar">
    <div class="batch-info">
      <span class="count-label">Queue // {{ editorSrv.imagesList().length }} Items</span>
    </div>
    <div class="batch-actions">
      <app-lib-button variant="secondary" (clicked)="editorSrv.resetAll()"
        >Clear Batch</app-lib-button
      >
      <app-lib-button variant="primary" (clicked)="goToExport()">Process All</app-lib-button>
    </div>
  </header>

  <div class="batch-grid">
    @for (image of editorSrv.imagesList(); track image.id) {
      <div class="grid-card" (click)="openEditor(image.id)">
        <img [src]="image.url" class="card-preview" loading="lazy" />
        <div class="card-footer">
          <p class="card-name">{{ image.name }}</p>
          <span class="card-status">READY</span>
        </div>
      </div>
    }
  </div>
</section>
