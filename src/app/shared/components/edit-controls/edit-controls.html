<aside class="sidebar">
  <div class="sidebar-content">
    <header class="sidebar-header">
      <div class="brand-eyebrow">Adjustments</div>
      <div class="header-top">
        <h2>Fine-tune your image</h2>
        <button class="btn-text-reset" (click)="resetAll()" title="Reset All Filters">Reset</button>
      </div>
    </header>

    <app-crop-controls
      [isCropActive]="isCropActive()"
      [aspectRatio]="aspectRatio()"
      [cropRect]="cropRect()"
      [aspectRatioOptions]="aspectRatioOptions()"
      [sourceWidth]="sourceWidth()"
      [sourceHeight]="sourceHeight()"
      (toggleCrop)="toggleCrop.emit()"
      (aspectRatioChange)="aspectRatioChange.emit($event)"
      (cropApply)="cropApply.emit()"
      (cropReset)="cropReset.emit()"
      (customResolution)="customResolution.emit($event)"
    />

    <div class="parameter-groups">
      <div class="group">
        <p class="group-label">Standard Grading</p>
        @for (ctrl of standardControls(); track ctrl.key) {
          <app-lib-slider
            [label]="ctrl.label"
            [value]="ctrl.currentValue"
            [min]="ctrl.min"
            [max]="ctrl.max"
            [stepSize]="ctrl.step"
            [unit]="ctrl.unit!"
            (valueChange)="update(ctrl.key, $event)"
          />
        }
      </div>

      <div class="group">
        <p class="group-label">Atmospheric Effects</p>
        @for (ctrl of aestheticControls(); track ctrl.key) {
          <app-lib-slider
            [label]="ctrl.label"
            [value]="ctrl.currentValue"
            [min]="ctrl.min"
            [max]="ctrl.max"
            [stepSize]="ctrl.step"
            [unit]="ctrl.unit!"
            (valueChange)="update(ctrl.key, $event)"
          />
        }
      </div>
    </div>
  </div>
</aside>
